name: CI/CD Módulo 4 - Qualidade de Código

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    
    # SOLUÇÃO: Subimos um banco de dados temporário (em Docker) dentro da esteira
    services:
      postgis:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma_password
          POSTGRES_DB: recorrencia_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências do Projeto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Análise estática com Ruff (Linting)
        run: |
          ruff check .
          ruff format --check .

      # SOLUÇÃO: Passamos a URL completa do banco de dados (novo padrão) para o Pytest
      - name: Rodar Testes com Pytest
        env:
          M4_DATABASE_URL: postgresql://prisma:prisma_password@localhost:5433/recorrencia_db
        run: |
          pytest --cov=src --cov-report=xml:coverage.xml tests/

      - name: Upload de Cobertura para o Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}